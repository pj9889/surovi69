<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service Site</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

/* Marquee */
.marquee {
  background: white;
  border: 1px solid black;
  overflow: hidden;
  white-space: nowrap;
}

.marquee p {
  display: inline-block;
  color: red;
  font-weight: bold;
  padding: 10px;
  animation: scroll 15s linear infinite;
}

@keyframes scroll {
  from { transform: translateX(100%); }
  to { transform: translateX(-100%); }
}

/* Images */
.image-box {
  display: flex;
  gap: 10px;
  padding: 10px;
}

.image-box img {
  width: 50%;
  aspect-ratio: 4/6;
  object-fit: cover;
  border-radius: 10px;
}

/* Section Title */
.section-title {
  padding: 10px;
  font-size: 18px;
  color: black;
  border-bottom: 3px solid red;
  width: fit-content;
  margin: 10px;
}

/* Service Box */
.service-box {
  background: pink;
  border: 1px solid black;
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
}

.service-item {
  margin: 10px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* Messenger Section */
.messenger-box {
  display: none;
  margin: 10px;
  padding: 10px;
  background: #fff;
  border-radius: 10px;
}

.messenger-item {
  margin: 10px 0;
}

/* Input Box */
.input-area {
  display: none;
  margin-top: 10px;
}

.input-area input {
  width: 100%;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 5px;
}

/* Button */
.buy-btn {
  display: none;
  width: 90%;
  margin: 20px auto;
  padding: 15px;
  background: linear-gradient(45deg, #ff0066, #ff3399);
  color: white;
  font-size: 18px;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  display: block;
  text-align: center;
}

.buy-btn:hover {
  opacity: 0.9;
}
</style>
</head>

<body>

<!-- Marquee -->
<div class="marquee">
  <p>আমার নাম সুরভী 😚 আমি ভিডিও কলে রেগুলার সার্ভিস দিয়ে থাকি 😘 সার্ভিস নিতে নিচে থাকা "আপনার মেসেঞ্জার এবং কত মিনিট সার্ভিস নিবেন তা সম্পূর্ণ করুন"</p>
</div>

<!-- Images -->
<div class="image-box">
  <img src="https://via.placeholder.com/300x450">
  <img src="https://via.placeholder.com/300x450">
</div>

<!-- Title -->
<div class="section-title">
  কতক্ষণ সার্ভিস নিবেন বাছাই করুন:
</div>

<!-- Service List -->
<div class="service-box">
  <div class="service-item">
    ৩ মিনিট - ১৫০ টাকা
    <input type="radio" name="service" onclick="showMessenger()">
  </div>
  <div class="service-item">
    ৫ মিনিট - ২৫০ টাকা
    <input type="radio" name="service" onclick="showMessenger()">
  </div>
  <div class="service-item">
    ১০ মিনিট - ৪০০ টাকা
    <input type="radio" name="service" onclick="showMessenger()">
  </div>
</div>

<!-- Messenger Section -->
<div class="messenger-box" id="messengerBox">

  <div class="section-title">আপনার মেসেঞ্জার বাছাই করুন:</div>

  <div class="messenger-item">
    <input type="radio" name="msg" onclick="showInput('whatsapp')"> WhatsApp
  </div>

  <div class="messenger-item">
    <input type="radio" name="msg" onclick="showInput('telegram')"> Telegram
  </div>

  <div class="messenger-item">
    <input type="radio" name="msg" onclick="showInput('imo')"> Imo
  </div>

  <!-- Input -->
  <div class="input-area" id="inputArea">
    <p style="color:red; font-size:14px;" id="inputLabel"></p>
    <input type="text" placeholder="আপনার নাম্বার / ইউজারনেম লিখুন">
  </div>

</div>

<!-- Button -->
<button class="buy-btn" id="buyBtn">সার্ভিস কিনুন</button>

<script>

function showMessenger() {
  document.getElementById("messengerBox").style.display = "block";
}

function showInput(type) {
  let label = "";

  if(type === "whatsapp") label = "WhatsApp নাম্বার দিন";
  if(type === "telegram") label = "Telegram ইউজারনেম দিন";
  if(type === "imo") label = "Imo নাম্বার দিন";

  document.getElementById("inputArea").style.display = "block";
  document.getElementById("inputLabel").innerText = label;

  document.getElementById("buyBtn").style.display = "block";
}

</script>

</body>
</html>
